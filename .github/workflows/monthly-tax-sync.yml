name: Automated Tax Data Sync (Auto-PR)

on:
  schedule:
    # Runs at 00:00 on the 1st of every month
    - cron: '0 0 1 * *'
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  sync-tax-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Utilities
        run: npm install -g tsx

      - name: Run Tax Sync Script
        run: npx tsx scripts/sync-tax-data.ts

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(data): automated monthly tax bracket sync"
          title: "🤖 Automated Data Sync: Global Tax Brackets"
          body: |
            ## Tax Data Auto-Sync
            
            This is an automated PR generated by the `monthly-tax-sync.yml` workflow.
            
            The internal `scripts/sync-tax-data.ts` pipeline detected a change in the upstream global tax structures (e.g., IRS, HMRC, ATO) and automatically updated `tool-constants.json`.
            
            **Action Required:**
            Please review the JSON diff below to ensure the math updates look correct. If everything is mathematically sound, click **Merge**. Cloudflare will automatically rebuild the site and all programmatic spoke pages using the fresh tax logic.
          branch: auto/tax-sync-${{ github.run_id }}
          base: main
