name: Daily Spoke Deploy Pipeline

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cloudflare Pages Build Hook
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_DEPLOY_HOOK }}" ]; then
            echo "Error: CLOUDFLARE_DEPLOY_HOOK secret is not set."
            exit 1
          fi
          echo "Triggering Cloudflare Deploy Hook to unlock today's SEO Spokes..."
          curl -X POST "${{ secrets.CLOUDFLARE_DEPLOY_HOOK }}"
